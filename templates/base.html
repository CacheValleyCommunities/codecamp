<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}CodeCamp: Bridgerland{{end}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/public/css/theme.css">
    {{block "styles" .}}{{end}}
</head>

<body>
    <nav class="navbar navbar-expand-lg site-navbar sticky-top">
        <div class="container">
            <a href="/" class="navbar-brand">CodeCamp:<span style="font-weight: 300 !important; color: #64748b;">Bridgerland</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="/" class="nav-link{{if eq .CurrentPage " home"}} active{{end}}">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle{{if or (eq .CurrentPage " about") (eq
                            .CurrentPage "past-winners" ) (eq .CurrentPage "volunteers" )}} active{{end}}" href="#"
                            id="aboutDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">About</a>
                        <ul class="dropdown-menu" aria-labelledby="aboutDropdown">
                            <li><a class="dropdown-item" href="/about">About Us</a></li>
                            <li><a class="dropdown-item" href="/past-winners">Past Winners</a></li>
                            <li><a class="dropdown-item" href="/volunteers">Volunteers</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a href="/sponsors" class="nav-link{{if eq .CurrentPage " sponsors"}}
                            active{{end}}">Sponsors</a>
                    </li>
                    <li class="nav-item">
                        <a href="/rules" class="nav-link{{if eq .CurrentPage " rules"}} active{{end}}">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a href="/summer-2025/" class="nav-link{{if eq .CurrentPage " archive"}} active{{end}}">2025
                            Archive</a>
                    </li>
                    <li class="nav-item">
                        <a href="https://cachevalley.co" target="_blank" rel="noopener noreferrer"
                            class="nav-link">Community</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {{block "content" .}}{{end}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {{block "scripts" .}}{{end}}
</body>

</html>
